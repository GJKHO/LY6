<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Bear Boom</title>

    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1" />

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">

    <!-- force webkit on 360 -->
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <!-- force edge on IE -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="msapplication-tap-highlight" content="no">

    <!-- force full screen on some browser -->
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />

    <!-- force screen orientation on some browser -->
    <!-- <meta name="screen-orientation" content="portrait"/>
    <meta name="x5-orientation" content="portrait"> -->

    <meta name="browsermode" content="application">
    <meta name="x5-page-mode" content="app">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style type="text/css">
        html {
            -ms-touch-action: none;
        }

        body,
        canvas,
        div {
            margin: 0;
            padding: 0;
            outline: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -khtml-user-select: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        body {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 0;
            border: 0;
            margin: 0;
            cursor: default;
            color: #888;
            background-color: #333;
            text-align: center;
            font-family: Helvetica, Verdana, Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        #Cocos2dGameContainer {
            position: absolute;
            margin: 0;
            overflow: hidden;
            left: 0px;
            top: 0px;
            display: -webkit-box;
            -webkit-box-orient: horizontal;
            -webkit-box-align: center;
            -webkit-box-pack: center;
        }

        canvas {
            background-color: rgba(0, 0, 0, 0);
        }

        /* ===== Adsgram Ad Layer ===== */
        #tg-ad-layer {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            pointer-events: none;
        }
        #tg-reward-btn {
            pointer-events: auto;
            font-size: 15px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #00b4d8, #0096c7);
            color: #fff;
            border: none;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            display: none;
        }
        #tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #tg-score-toast {
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 8px #000;
            display: none;
            animation: floatUp 1.2s ease forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>
<script>
</script>
<script>
    var upateLoadProgress = function() {

    }

    var loadJs = function(url, cb) {
        var script = document.createElement("script");
        script.async = false;
        script.src = url;
        document.body.appendChild(script);
        if (cb != null) {
            script.onload = cb;
        }
    }

    function bodyLoadComplete() {
        loadJs("game.min.js");
    }
</script>

<body onload="bodyLoadComplete()">
    <script src="cclib.js"></script>
    <canvas id="gameCanvas" width="720" height="1280"></canvas>

    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <!-- Adsgram Ad Layer -->
    <div id="tg-ad-layer">
        <div id="tg-score-toast">+200 pts</div>
        <button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200 pts</button>
    </div>

    <script>
    (function () {
        // Telegram SDK 初始化
        window.Telegram && window.Telegram.WebApp && (
            window.Telegram.WebApp.ready(),
            window.Telegram.WebApp.expand()
        );

        var AdController = null;
        var IntAdController = null;

        // 从 ID.txt 读取广告 Block ID，格式：KEY=VALUE，每行一条
        function loadConfig(cb) {
            fetch('ID.txt?_=' + Date.now())
                .then(function (r) { return r.text(); })
                .then(function (text) {
                    var cfg = {};
                    text.split('\n').forEach(function (line) {
                        var parts = line.trim().split('=');
                        if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
                    });
                    cb(cfg);
                })
                .catch(function () { cb({}); });
        }

        function initAds(cfg) {
            if (!window.Adsgram) return;
            var rewardId = cfg['REWARD_BLOCK_ID'] || '';
            var intId    = cfg['INT_BLOCK_ID']    || '';
            try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch(e) {}
            try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch(e) {}

            document.getElementById('tg-reward-btn').style.display = 'block';
            startIntAdTimer();
        }

        function waitAndInit(cfg) {
            if (window.Adsgram) {
                initAds(cfg);
            } else {
                var sdkCheck = setInterval(function () {
                    if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
                }, 300);
            }
        }

        // 先加载配置，再初始化广告
        loadConfig(function (cfg) {
            waitAndInit(cfg);
        });

        // 激励广告：看完后 +200 分
        window.tgShowRewardAd = function () {
            if (!AdController) return;
            var btn = document.getElementById('tg-reward-btn');
            btn.disabled = true;
            AdController.show().then(function () {
                // 通知游戏加分（游戏脚本可覆盖此函数实现真实加分）
                if (typeof window.onAdsgramReward === 'function') {
                    window.onAdsgramReward(200);
                }
                // 浮动提示
                var toast = document.getElementById('tg-score-toast');
                toast.style.display = 'block';
                toast.style.animation = 'none';
                setTimeout(function () {
                    toast.style.animation = 'floatUp 1.2s ease forwards';
                    setTimeout(function () { toast.style.display = 'none'; }, 1200);
                }, 20);
                // 60 秒冷却
                var cd = 60;
                btn.textContent = '⏳ ' + cd + 's';
                var cdTimer = setInterval(function () {
                    cd--;
                    if (cd <= 0) {
                        clearInterval(cdTimer);
                        btn.disabled = false;
                        btn.textContent = '📺 Watch Ad +200 pts';
                    } else {
                        btn.textContent = '⏳ ' + cd + 's';
                    }
                }, 1000);
            }).catch(function () {
                btn.disabled = false;
            });
        };

        // 插屏广告：每 30 秒自动弹出
        var intAdInterval = null;
        function startIntAdTimer() {
            intAdInterval = setInterval(function () {
                if (!IntAdController) return;
                IntAdController.show().then(function () {}).catch(function () {});
            }, 30000);
        }
    })();
    </script>

</body>

</html>
